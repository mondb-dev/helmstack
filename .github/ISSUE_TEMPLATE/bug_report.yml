name: 🐛 Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below.

  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      options:
        - "@helmstack/desktop"
        - "@helmstack/agent-sdk"
        - "@helmstack/mcp-server"
        - "@helmstack/perception"
        - "@helmstack/shared"
        - Other / Not sure
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what happened.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Clone repo and install dependencies
        2. Run `npm run dev`
        3. Connect an agent to localhost:7070
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please provide the following information:
      value: |
        - OS: [e.g., macOS 15.2, Ubuntu 24.04, Windows 11]
        - Node.js: [e.g., 22.x]
        - npm: [e.g., 10.x]
        - Electron: [e.g., 35.x]
        - HelmStack version: [e.g., 0.1.0]
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste any relevant log output or screenshots.
      render: shell
    validations:
      required: false
